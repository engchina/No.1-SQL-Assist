title: "Deploy No.1-SQL-Assist on Oracle Cloud Infrastructure Compute instance"
stackDescription: "Deploy No.1-SQL-Assist, a tool to help developers easily generate SQL queries and deepen their understanding of SQL, on Oracle Cloud Infrastructure Compute instance"
schemaVersion: 1.1.0
version: "20220422"
locale: "en"

variableGroups:
  - title: Required Configuration
    visible: true
    variables:
      - region
      - compartment_ocid
      - availability_domain
      - adb_name
      - adb_password
      - license_model
      - instance_display_name
      - vcn_ai_vcn_id
      - adb_use_private_subnet
      - adb_subnet_id
      - subnet_ai_subnet_id
      - ssh_authorized_keys

  - title: Compute Configuration
    visible: true
    variables:
      - instance_image_source_id
      - instance_shape
      - instance_flex_shape_ocpus
      - instance_flex_shape_memory
      - instance_boot_volume_size
      - instance_boot_volume_vpus

variables:
  region:
    title: Region
    type: oci:identity:region:name
    required: true
    visible: false

  compartment_ocid:
    type: oci:identity:compartment:id
    required: true
    visible: true
    title: "Create in compartment"

  availability_domain:
    type: oci:identity:availabilitydomain:name
    required: true
    visible: true
    title: "Availability domain"
    dependsOn:
      region: ${region}
      compartmentId: ${compartment_ocid}

  adb_name:
    type: string
    required: true
    visible: true
    title: "Database name"

  adb_password:
    type: password
    required: true
    visible: true
    title: "Database password"
    description: "Set the password for your Autonomous Database ADMIN user here."
    # renders a second field to re-enter the password for confirmation
    confirmation: true
    pattern: "^(?!.*admin)(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?!.*[\"]).{12,30}$"

  license_model:
    type: enum
    required: true
    visible: true
    title: "Choose license"
    enum:
      - "BRING_YOUR_OWN_LICENSE"
      - "LICENSE_INCLUDED"
    default: "LICENSE_INCLUDED"

  instance_display_name:
    type: string
    required: true
    visible: true
    title: "Compute instance name"

  vcn_ai_vcn_id:
    type: oci:core:vcn:id
    required: true
    visible: true
    title: "VCN"
    description: "Select existing virtual cloud network"
    dependsOn:
      compartmentId: ${compartment_ocid}

  adb_use_private_subnet:
    type: boolean
    required: true
    visible: true
    title: "Use Private Subnet for ADB"
    description: "Enable to attach Autonomous Database to a private subnet. Disable to deploy ADB without a subnet."
    default: false

  adb_subnet_id:
    type: oci:core:subnet:id
    required: true
    visible:
      eq:
        - adb_use_private_subnet
        - true
    title: "ADB Subnet"
    description: "Select private subnet for Autonomous Database"
    dependsOn:
      compartmentId: ${compartment_ocid}
      vcnId: ${vcn_ai_vcn_id}

  subnet_ai_subnet_id:
    type: oci:core:subnet:id
    required: true
    visible: true
    title: "Compute Subnet"
    description: "Select existing subnet for Compute instance"
    dependsOn:
      compartmentId: ${compartment_ocid}
      vcnId: ${vcn_ai_vcn_id}

  ssh_authorized_keys:
    type: oci:core:ssh:publickey
    title: "Add SSH keys"
    description: "Upload a public key that you already have."
    required: true
    visible: true

  instance_image_source_id:
    type: enum
    required: true
    visible: true
    title: "Choose the image according to your region."
    enum:
      - "ocid1.image.oc1.ap-tokyo-1.aaaaaaaaoiusqhftxmiyjlulnxx5mdnqfv6pjx4hdcoks3exn7gsrcwpkpdq"
      - "ocid1.image.oc1.ap-osaka-1.aaaaaaaa7sbmd5q54w466eojxqwqfvvp554awzjpt2behuwsiefrxnwomq5a"
      - "ocid1.image.oc1.us-chicago-1.aaaaaaaal25tbfrlwhh27tzgiatqr3oq5y3qzz7wgpezjouvjk2cdfdr4mnq"
    default: "ocid1.image.oc1.ap-osaka-1.aaaaaaaa7sbmd5q54w466eojxqwqfvvp554awzjpt2behuwsiefrxnwomq5a"

  instance_shape:
    type: enum
    required: true
    visible: true
    title: "Choose the shape."
    enum:
      - "VM.Standard.E4.Flex"
      - "VM.Standard.E5.Flex"
    default: "VM.Standard.E5.Flex"

  instance_boot_volume_size:
    required: true
    visible: true
    title: "Compute boot block volume size (GB)"
    description: "Set the boot block volume capacity for the Compute instance."
    default: 100
  instance_boot_volume_vpus:
    required: true
    visible: true
    title: "Compute boot block volume VPUs per GB"
    description: "Set the boot block volume performance for the Compute instance."
    default: 10
  instance_flex_shape_memory:
    required: true
    visible: true
    title: "Compute memory (GB)"
    description: "Set memory for the Compute flex shape."
    default: 16
  instance_flex_shape_ocpus:
    required: true
    visible: true
    title: "Compute OCPUs"
    description: "Set OCPUs for the Compute flex shape."
    default: 2

outputs:

  autonomous_data_warehouse_high_connection_string:
    title: "Autonomous Data Warehouse High Connection String"
    displayText: "Autonomous Data Warehouse High Connection String"
    type: copyableString
    visible: true

  ssh_to_instance:
    title: "Convenient command to ssh to the instance"
    displayText: "Convenient command to ssh to the instance"
    type: copyableString
    visible: true

  application_url:
    title: "Application URL"
    displayText: "Application URL"
    type: copyableString
    visible: true
