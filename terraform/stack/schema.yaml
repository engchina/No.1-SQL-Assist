title: "Deploy No.1-SQL-Assist on Oracle Cloud Infrastructure Compute instance"
stackDescription: "Deploy No.1-SQL-Assist, a tool to help developers easily generate SQL queries and deepen their understanding of SQL, on Oracle Cloud Infrastructure Compute instance"
schemaVersion: 1.1.0
version: "20220422"
locale: "en"

variableGroups:
  - title: Hidden
    visible: false
    variables:
      - adb_compute_model
      - adb_use_private_subnet

  - title: Required Configuration
    visible: true
    variables:
      - region
      - compartment_ocid
      - availability_domain
      - vcn_ai_vcn_id

  - title: Autonomous Database
    visible: true
    variables:
      - adb_display_name
      - adb_name
      - adb_workload
      - adb_db_version
      - adb_compute_count
      - adb_is_auto_scaling_enabled
      - adb_data_storage_size_in_tbs
      - adb_is_auto_scaling_for_storage_enabled
      - adb_is_elastic_pool_enabled
      - adb_resource_pool_size
      - adb_resource_pool_storage_size_in_tbs
      - license_model
      - adb_backup_retention_period_in_days
      - adb_password
      - adb_network_access_type
      - adb_subnet_id
      - adb_acl_notation_type
      - adb_acl_vcn_id
      - adb_acl_subnet_id
      - adb_acl_cidr_blocks
      - adb_is_mtls_connection_required

  - title: Compute
    visible: true
    variables:
      - application_port
      - application_git_tag
      - instance_display_name
      - instance_image_source_id
      - instance_shape
      - instance_flex_shape_ocpus
      - instance_flex_shape_memory
      - instance_boot_volume_size
      - instance_boot_volume_vpus
      - subnet_ai_subnet_id
      - ssh_authorized_keys

variables:
  region:
    title: Region
    type: oci:identity:region:name
    required: true
    visible: false

  compartment_ocid:
    type: oci:identity:compartment:id
    required: true
    visible: true
    title: "Create in compartment"

  availability_domain:
    type: oci:identity:availabilitydomain:name
    required: true
    visible: true
    title: "Availability domain"
    dependsOn:
      region: ${region}
      compartmentId: ${compartment_ocid}

  vcn_ai_vcn_id:
    type: oci:core:vcn:id
    required: true
    visible: true
    title: "VCN"
    description: "Select existing virtual cloud network"
    dependsOn:
      compartmentId: ${compartment_ocid}

  adb_display_name:
    type: string
    required: false
    visible: true
    title: "ADB display name"
    description: "Leave blank to use the database name."

  adb_name:
    type: string
    required: true
    visible: true
    title: "Database name"

  adb_workload:
    type: enum
    required: true
    visible: true
    title: "Workload type"
    enum:
      - "OLTP"
      - "DW"
      - "AJD"
      - "APEX"
      - "LH"
    default: "DW"

  adb_db_version:
    type: enum
    required: true
    visible: true
    title: "Database version"
    enum:
      - "19c"
      - "23ai"
      - "26ai"
    default: "26ai"

  adb_compute_model:
    type: enum
    required: true
    visible: false
    title: "Compute model"
    enum:
      - "ECPU"
      - "OCPU"
    default: "ECPU"

  adb_compute_count:
    type: number
    required: true
    visible: true
    title: "ECPU count"
    description: "Set the Autonomous Database ECPU count."
    default: 2

  adb_is_auto_scaling_enabled:
    type: boolean
    required: true
    visible: true
    title: "CPU auto scaling"
    default: false

  adb_data_storage_size_in_tbs:
    type: number
    required: true
    visible: true
    title: "Storage (TB)"
    default: 1

  adb_is_auto_scaling_for_storage_enabled:
    type: boolean
    required: true
    visible: true
    title: "Storage auto scaling"
    default: false

  adb_is_elastic_pool_enabled:
    type: boolean
    required: true
    visible: true
    title: "Enable elastic pool"
    default: false

  adb_resource_pool_size:
    type: number
    required: true
    visible:
      eq:
        - adb_is_elastic_pool_enabled
        - true
    title: "Elastic pool size"
    default: 0

  adb_resource_pool_storage_size_in_tbs:
    type: number
    required: true
    visible:
      eq:
        - adb_is_elastic_pool_enabled
        - true
    title: "Elastic pool storage (TB)"
    default: 0

  license_model:
    type: enum
    required: true
    visible: true
    title: "License type"
    enum:
      - "BRING_YOUR_OWN_LICENSE"
      - "LICENSE_INCLUDED"
    default: "LICENSE_INCLUDED"

  adb_backup_retention_period_in_days:
    type: number
    required: true
    visible: true
    title: "Automatic backup retention period (days)"
    default: 1

  adb_password:
    type: password
    required: true
    visible: true
    title: "Database password"
    description: "Set the password for your Autonomous Database ADMIN user here."
    # renders a second field to re-enter the password for confirmation
    confirmation: true
    pattern: "^(?!.*admin)(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?!.*[\"]).{12,30}$"

  adb_network_access_type:
    type: enum
    required: true
    visible: true
    title: "Network access"
    enum:
      - "PUBLIC_ENDPOINT"
      - "SECURE_ACCESS_FROM_ALLOWED_IPS_AND_VCNS"
      - "PRIVATE_ENDPOINT_ONLY"
    default: "PRIVATE_ENDPOINT_ONLY"

  adb_use_private_subnet:
    type: boolean
    required: true
    visible: false
    title: "Use Private Subnet for ADB"
    description: "Compatibility switch for older tfvars. Prefer adb_network_access_type."
    default: false

  adb_subnet_id:
    type: oci:core:subnet:id
    required: true
    visible:
      eq:
        - adb_network_access_type
        - "PRIVATE_ENDPOINT_ONLY"
    title: "ADB private endpoint subnet"
    description: "Select the subnet for Autonomous Database private endpoint access."
    dependsOn:
      compartmentId: ${compartment_ocid}
      vcnId: ${vcn_ai_vcn_id}

  adb_acl_notation_type:
    type: enum
    required: true
    visible:
      eq:
        - adb_network_access_type
        - "SECURE_ACCESS_FROM_ALLOWED_IPS_AND_VCNS"
    title: "IP notation type"
    enum:
      - "VCN"
      - "CIDR_BLOCK"
    default: "VCN"

  adb_acl_vcn_id:
    type: oci:core:vcn:id
    required: true
    visible:
      eq:
        - adb_network_access_type
        - "SECURE_ACCESS_FROM_ALLOWED_IPS_AND_VCNS"
    title: "Allowed VCN"
    dependsOn:
      compartmentId: ${compartment_ocid}

  adb_acl_subnet_id:
    type: oci:core:subnet:id
    required: false
    visible:
      eq:
        - adb_network_access_type
        - "SECURE_ACCESS_FROM_ALLOWED_IPS_AND_VCNS"
    title: "Allowed subnet"
    description: "Optional. When selected, the subnet CIDR is added as VCN;CIDR in the ADB access list."
    dependsOn:
      compartmentId: ${compartment_ocid}
      vcnId: ${adb_acl_vcn_id}

  adb_acl_cidr_blocks:
    type: string
    required: false
    visible:
      eq:
        - adb_acl_notation_type
        - "CIDR_BLOCK"
    title: "Allowed CIDR blocks"
    description: "Comma-separated CIDR blocks for ADB secure access."

  adb_is_mtls_connection_required:
    type: boolean
    required: true
    visible: true
    title: "Require mutual TLS (mTLS)"
    default: true

  application_port:
    type: number
    required: true
    visible: true
    title: "Application port"
    description: "TCP port exposed by Gradio and the instance firewall. Use 8080 by default, 80 for standard HTTP, or another port from 1 through 65535."
    default: 8080

  application_git_tag:
    type: string
    required: true
    visible: true
    title: "Application Git tag"
    description: "Deploy an immutable non-main Git tag. The default release for this stack is v0.1.10."
    default: "v0.1.10"

  instance_display_name:
    type: string
    required: true
    visible: true
    title: "Compute instance name"

  instance_image_source_id:
    type: enum
    required: true
    visible: true
    title: "Choose the image according to your region."
    enum:
      - "ocid1.image.oc1.ap-tokyo-1.aaaaaaaaoiusqhftxmiyjlulnxx5mdnqfv6pjx4hdcoks3exn7gsrcwpkpdq"
      - "ocid1.image.oc1.ap-osaka-1.aaaaaaaa7sbmd5q54w466eojxqwqfvvp554awzjpt2behuwsiefrxnwomq5a"
      - "ocid1.image.oc1.us-chicago-1.aaaaaaaal25tbfrlwhh27tzgiatqr3oq5y3qzz7wgpezjouvjk2cdfdr4mnq"
    default: "ocid1.image.oc1.ap-osaka-1.aaaaaaaa7sbmd5q54w466eojxqwqfvvp554awzjpt2behuwsiefrxnwomq5a"

  instance_shape:
    type: enum
    required: true
    visible: true
    title: "Choose the shape."
    enum:
      - "VM.Standard.E4.Flex"
      - "VM.Standard.E5.Flex"
    default: "VM.Standard.E5.Flex"

  instance_flex_shape_ocpus:
    type: number
    required: true
    visible: true
    title: "Compute OCPUs"
    default: 2

  instance_flex_shape_memory:
    type: number
    required: true
    visible: true
    title: "Compute memory (GB)"
    default: 16

  instance_boot_volume_size:
    type: number
    required: true
    visible: true
    title: "Boot volume size (GB)"
    description: "Minimum 50 GB. Maximum 32768 GB."
    default: 100

  instance_boot_volume_vpus:
    type: number
    required: true
    visible: true
    title: "Boot volume VPUs/GB"
    description: "Use 10 for Balanced, 20 for Higher Performance, or 30-120 for Ultra High Performance."
    default: 10

  subnet_ai_subnet_id:
    type: oci:core:subnet:id
    required: true
    visible: true
    title: "Compute subnet"
    description: "Select a public or private subnet. Public IP assignment is detected automatically from the selected subnet. Private subnets require NAT for installation and private connectivity for application and SSH access."
    dependsOn:
      compartmentId: ${compartment_ocid}
      vcnId: ${vcn_ai_vcn_id}

  ssh_authorized_keys:
    type: oci:core:ssh:publickey
    title: "Add SSH keys"
    description: "Upload a public key that you already have."
    required: true
    visible: true

outputs:

  autonomous_data_warehouse_ocid:
    title: "Autonomous Data Warehouse OCID"
    displayText: "Autonomous Data Warehouse OCID"
    type: copyableString
    visible: true

  autonomous_data_warehouse_high_connection_string:
    title: "Autonomous Data Warehouse High Connection String"
    displayText: "Autonomous Data Warehouse High Connection String"
    type: copyableString
    visible: true

  ssh_to_instance:
    title: "Convenient command to ssh to the instance"
    displayText: "Convenient command to ssh to the instance"
    type: copyableString
    visible: true

  application_url:
    title: "Application URL"
    displayText: "Application URL"
    type: copyableString
    visible: true
